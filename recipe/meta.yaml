{% set name = "sunkit-image" %}
{% set version = "0.7.0" %}
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sunkit_image-{{ version }}.tar.gz
  sha256: 9e8d52d8b0feececc8f15daba96b4167491cf3afc4048d268b8333c10686de5a

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - setuptools_scm
    - extension-helpers
  run:
    - python >={{ python_min }}
    - astropy-base >=6.1.0
    - numpy >=1.26.0
    - matplotlib-base >=3.8.0
    - scipy >=1.12.0
    - sunpy >=7.0.0
    - scikit-image >=0.20.0

test:
  requires:
    - pytest-astropy
    - pytest-doctestplus
    - pytest-mock
    - dask
    - python {{ python_min }}
  imports:
    - sunkit_image
    - sunkit_image.enhance
    - sunkit_image.radial
    - sunkit_image.time_lag
    - sunkit_image.trace
    - sunkit_image.utils
  commands:
    - python -m pytest -vvv --pyargs sunkit_image

about:
  home: https://github.com/sunpy/sunkit-image
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.rst
  summary: A image processing toolbox for Solar Physics
  description: |
    sunkit-image is a community-developed, free and open-source solar data image analysis environment for Python
  doc_url: https://docs.sunpy.org/projects/sunkit-image/
  dev_url: https://github.com/sunpy/sunkit-image

extra:
  recipe-maintainers:
    - cadair
    - wtbarnes
